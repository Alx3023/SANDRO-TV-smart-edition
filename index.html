<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SANDRO TV">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>SANDRO TV smart edition</title>
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
:root {
    --primary: #e50914;
    --primary-dark: #b2070f;
    --primary-glow: rgba(229, 9, 20, 0.5);
    --bg-dark: #000000;
    --glass-bg: rgba(40, 40, 40, 0.4);
    --glass-bg-heavy: rgba(20, 20, 20, 0.85);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-primary: #ffffff;
    --text-secondary: #b0b0b0;
    --ios-blue: #007AFF;
    --ios-green: #34C759;
    --ios-red: #FF3B30;
    --ios-orange: #FF9500;
    --ios-purple: #AF52DE;
    --ios-yellow: #FFCC00;
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    margin: 0;
    padding: 0;
}

html, body {
    height: 100%;
    overflow: hidden;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-font-smoothing: antialiased;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
}

/* Animated background */
body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
        radial-gradient(circle at 20% 30%, rgba(229, 9, 20, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 122, 255, 0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
    animation: bgShift 20s ease infinite;
}

@keyframes bgShift {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.1); }
}

/* ===== HEADER ===== */
.app-header {
    height: 56px;
    background: var(--glass-bg-heavy);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    flex-shrink: 0;
    z-index: 100;
}

.header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    justify-content: center;
}

/* LOGO SVG */
.brand-logo {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 15px var(--primary-glow);
    animation: logoPulse 3s ease infinite;
    flex-shrink: 0;
}

.brand-logo svg {
    width: 20px;
    height: 20px;
    color: white;
}

@keyframes logoPulse {
    0%, 100% { box-shadow: 0 0 15px var(--primary-glow); }
    50% { box-shadow: 0 0 25px var(--primary-glow); }
}

.brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
}

.brand-title {
    font-size: 16px;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.5px;
}

.brand-subtitle {
    font-size: 9px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
}

.header-status {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(52, 199, 89, 0.15);
    border: 1px solid rgba(52, 199, 89, 0.3);
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    color: var(--ios-green);
}

.status-dot {
    width: 6px;
    height: 6px;
    background: var(--ios-green);
    border-radius: 50%;
    animation: blink 1.5s infinite;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

/* ===== MAIN CONTENT ===== */
.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}

/* ===== CHANNEL DROPDOWN (MENU A TENDINA) ===== */
.channel-dropdown {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 50;
}

.dropdown-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--glass-bg-heavy);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

.dropdown-toggle:active { transform: scale(0.97); }

.dropdown-toggle svg {
    width: 16px;
    height: 16px;
    transition: transform 0.3s;
}

.dropdown-toggle.open svg:last-child { transform: rotate(180deg); }

.dropdown-badge {
    background: var(--primary);
    color: white;
    padding: 2px 6px;
    border-radius: 8px;
    font-size: 9px;
    font-weight: 700;
}

.dropdown-menu {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    width: 320px;
    height: 70vh;
    max-height: 600px;
    background: var(--glass-bg-heavy);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
    display: none;
    flex-direction: column;
    overflow: hidden;
    animation: dropdownSlide 0.3s ease;
}

.dropdown-menu.open { display: flex; }

@keyframes dropdownSlide {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

.dropdown-search {
    padding: 10px;
    border-bottom: 1px solid var(--glass-border);
    flex-shrink: 0;
}

.search-input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
}

.search-icon {
    position: absolute;
    left: 10px;
    width: 14px;
    height: 14px;
    color: var(--text-secondary);
}

.search-input {
    width: 100%;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    padding: 8px 10px 8px 32px;
    color: var(--text-primary);
    font-size: 12px;
    outline: none;
    transition: var(--transition);
}

.search-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px var(--primary-glow);
}

.dropdown-filters {
    padding: 8px 10px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    border-bottom: 1px solid var(--glass-border);
    scrollbar-width: none;
    flex-shrink: 0;
}

.dropdown-filters::-webkit-scrollbar { display: none; }

.filter-chip {
    padding: 4px 10px;
    border-radius: 14px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: var(--text-secondary);
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: var(--transition);
}

.filter-chip:active { transform: scale(0.95); }

.filter-chip.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
}

.dropdown-list {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 6px 0;
    -webkit-overflow-scrolling: touch;
    min-height: 0;
}

.dropdown-list::-webkit-scrollbar { width: 3px; }
.dropdown-list::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 2px;
}

.channel-group-header {
    padding: 6px 12px;
    font-size: 9px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    background: rgba(0, 0, 0, 0.3);
    position: sticky;
    top: 0;
    z-index: 10;
}

.channel-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    cursor: pointer;
    transition: var(--transition);
    border-left: 3px solid transparent;
}

.channel-option:hover {
    background: rgba(229, 9, 20, 0.1);
    border-left-color: var(--primary);
}

.channel-option:active { transform: scale(0.98); }

.channel-option.active {
    background: linear-gradient(90deg, rgba(229, 9, 20, 0.2), transparent);
    border-left-color: var(--primary);
}

.channel-option-logo {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    overflow: hidden;
    flex-shrink: 0;
}

.channel-option-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.channel-option-info {
    flex: 1;
    overflow: hidden;
}

.channel-option-name {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.channel-option-group {
    font-size: 9px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.dropdown-actions {
    padding: 10px;
    border-top: 1px solid var(--glass-border);
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    background: var(--glass-bg-heavy);
}

.action-btn-small {
    flex: 1;
    padding: 10px 6px;
    border-radius: 10px;
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    color: var(--text-primary);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: var(--transition);
}

.action-btn-small:active {
    transform: scale(0.95);
    background: var(--primary);
}

.action-btn-small svg { width: 14px; height: 14px; }

/* ===== PLAYER ===== */
.player-wrapper {
    flex: 1;
    position: relative;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

#videoPlayer {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
}

.player-placeholder {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
}

.placeholder-icon {
    font-size: 56px;
    margin-bottom: 12px;
    opacity: 0.5;
    animation: float 3s ease infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.placeholder-text { font-size: 13px; font-weight: 500; }

/* Play Overlay */
.play-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(5px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 5;
}

.play-overlay.active {
    display: flex;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.play-overlay-btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(229, 9, 20, 0.6);
    animation: pulsePlay 2s infinite;
}

.play-overlay-btn svg {
    width: 36px;
    height: 36px;
    color: white;
    margin-left: 4px;
}

@keyframes pulsePlay {
    0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(229, 9, 20, 0.6); }
    50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(229, 9, 20, 0.9); }
}

.play-overlay-text {
    margin-top: 12px;
    color: white;
    font-size: 13px;
    font-weight: 600;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
}

/* Recording Badge */
.rec-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(255, 59, 48, 0.9);
    backdrop-filter: blur(10px);
    padding: 5px 10px;
    border-radius: 16px;
    display: none;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 700;
    z-index: 10;
}

.rec-badge.active {
    display: flex;
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from { transform: translateX(100px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

.rec-dot {
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: blink 1s infinite;
}

/* ===== CONTROL BAR iOS GLASSMORPHISM ===== */
.control-bar {
    background: var(--glass-bg-heavy);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-top: 1px solid var(--glass-border);
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
}

.control-row {
    display: flex;
    align-items: center;
    gap: 8px;
}

.main-controls {
    justify-content: center;
    gap: 16px;
    padding: 8px 0;
    border-bottom: 1px solid var(--glass-border);
    margin-bottom: 4px;
}

.secondary-controls {
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
}

.input-wrapper {
    flex: 1;
    display: flex;
    gap: 8px;
}

input[type="text"] {
    flex: 1;
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text-primary);
    font-size: 12px;
    outline: none;
    transition: var(--transition);
}

input[type="text"]:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px var(--primary-glow);
}

/* iOS BUTTONS */
.ios-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 14px;
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
}

.ios-btn:active { transform: scale(0.93); }

.ios-btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
    flex-shrink: 0;
}

/* PLAY/PAUSE BUTTON */
.ios-btn.play-pause {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    padding: 0;
    background: linear-gradient(135deg, var(--ios-green), #28a745);
    border: none;
    box-shadow: 0 6px 20px rgba(52, 199, 89, 0.4);
}

.ios-btn.play-pause svg { width: 32px; height: 32px; }

.ios-btn.play-pause:active {
    transform: scale(0.92);
    box-shadow: 0 4px 12px rgba(52, 199, 89, 0.3);
}

/* NAV BUTTONS */
.ios-btn.nav {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    padding: 0;
}

.ios-btn.nav svg { width: 22px; height: 22px; }

/* COMPACT BUTTONS */
.ios-btn.compact {
    padding: 8px 12px;
    font-size: 11px;
    border-radius: 10px;
}

.ios-btn.compact svg { width: 16px; height: 16px; }

.ios-btn.primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-color: rgba(229, 9, 20, 0.5);
    color: white;
}

.ios-btn.record {
    background: rgba(255, 59, 48, 0.15);
    border-color: rgba(255, 59, 48, 0.4);
    color: var(--ios-red);
}

.ios-btn.record.recording {
    background: var(--ios-red);
    color: white;
    animation: pulseRec 1.5s infinite;
}

@keyframes pulseRec {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.6); }
    50% { box-shadow: 0 0 0 8px rgba(255, 59, 48, 0); }
}

.ios-btn.screenshot {
    background: rgba(0, 122, 255, 0.15);
    border-color: rgba(0, 122, 255, 0.4);
    color: var(--ios-blue);
}

.ios-btn.audio {
    background: rgba(52, 199, 89, 0.15);
    border-color: rgba(52, 199, 89, 0.4);
    color: var(--ios-green);
}

.ios-btn.audio.muted {
    background: rgba(255, 107, 107, 0.15);
    border-color: rgba(255, 107, 107, 0.4);
    color: #ff6b6b;
}

.ios-btn.pip {
    background: rgba(175, 82, 222, 0.15);
    border-color: rgba(175, 82, 222, 0.4);
    color: var(--ios-purple);
}

.ios-btn.file {
    background: rgba(255, 149, 0, 0.15);
    border-color: rgba(255, 149, 0, 0.4);
    color: var(--ios-orange);
}

.hidden { display: none !important; }

/* ===== RECORDINGS PANEL ===== */
.recordings-panel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: var(--glass-bg-heavy);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-top: 1px solid var(--glass-border);
    display: none;
    flex-direction: column;
    z-index: 40;
    animation: slideUp 0.3s ease;
}

.recordings-panel.open { display: flex; }

@keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
}

.recordings-header {
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--glass-border);
    font-size: 12px;
    font-weight: 700;
}

.recordings-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
}

.rec-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.rec-item:hover { background: rgba(229, 9, 20, 0.1); }

.rec-info {
    flex: 1;
    overflow: hidden;
}

.rec-title {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.rec-meta {
    font-size: 9px;
    color: var(--text-secondary);
    display: flex;
    gap: 8px;
}

.rec-actions { display: flex; gap: 4px; }

.rec-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: var(--text-primary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
}

.rec-btn:active { transform: scale(0.9); }

.rec-btn.primary {
    background: var(--ios-blue);
    border-color: var(--ios-blue);
}

.rec-btn.danger {
    background: rgba(255, 59, 48, 0.2);
    border-color: var(--ios-red);
    color: var(--ios-red);
}

/* ===== TOAST ===== */
.toast {
    position: fixed;
    top: calc(var(--safe-top) + 60px);
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--glass-bg-heavy);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--glass-border);
    padding: 10px 16px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    border-left: 3px solid var(--primary);
    max-width: 90%;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.toast-icon { font-size: 16px; }

/* ===== MODAL ===== */
.modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(10px);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 500;
}

.modal-overlay.active {
    display: flex;
    animation: fadeIn 0.2s ease;
}

.modal-content {
    background: var(--glass-bg-heavy);
    backdrop-filter: blur(20px) saturate(180%);
    width: 100%;
    max-width: 500px;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    padding-bottom: calc(20px + var(--safe-bottom));
    animation: slideUp 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    border-top: 1px solid var(--glass-border);
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
}

.modal-title { font-size: 16px; font-weight: 700; }

.modal-close {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: var(--text-primary);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.modal-close:active {
    transform: scale(0.9);
    background: var(--primary);
}

.modal-input {
    width: 100%;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    margin-bottom: 10px;
}

.modal-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px var(--primary-glow);
}

.modal-btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
}

.modal-btn.primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
}

/* Screenshot preview */
.screenshot-preview {
    position: fixed;
    bottom: 15px;
    left: 15px;
    width: 160px;
    height: 90px;
    border-radius: 8px;
    border: 2px solid var(--primary);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
    z-index: 1000;
    animation: slideInLeft 0.2s ease;
    cursor: pointer;
    object-fit: cover;
}

.screenshot-preview:hover { transform: scale(1.3); }

@keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-100%); }
    to { opacity: 1; transform: translateX(0); }
}

/* Video flash */
.video-flash {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
}

.video-flash.flash { animation: flashEffect 0.2s; }

@keyframes flashEffect {
    0% { opacity: 0; }
    10% { opacity: 0.8; }
    100% { opacity: 0; }
}

input[type="file"] { display: none; }

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {

    .ios-btn.compact { padding: 6px 10px; font-size: 10px; }

}

@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {

}

// === STORAGE ===
function loadFromStorage() {
    try {
        const rec = localStorage.getItem('sandro_recordings');
        const playlists = localStorage.getItem('sandro_playlists');
        if (rec) App.recordings = JSON.parse(rec);
        if (playlists) App.savedPlaylists = JSON.parse(playlists);
    } catch (e) { console.error(e); }
}

function saveToStorage() {
    try {
        localStorage.setItem('sandro_recordings', JSON.stringify(App.recordings));
        localStorage.setItem('sandro_playlists', JSON.stringify(App.savedPlaylists));
    } catch (e) { console.error(e); }
}

// === DROPDOWN MENU ===
function toggleDropdown() {
    const toggle = document.getElementById('dropdownToggle');
    const menu = document.getElementById('dropdownMenu');
    toggle.classList.toggle('open');
    menu.classList.toggle('open');
}

function closeDropdown() {
    const toggle = document.getElementById('dropdownToggle');
    const menu = document.getElementById('dropdownMenu');
    toggle.classList.remove('open');
    menu.classList.remove('open');
}

// === RENDER CANALI ===
function renderChannels() {
    const container = document.getElementById('channelList');
    const channels = App.filteredChannels;
    
    if (channels.length === 0) {
        container.innerHTML = '<div style="padding: 30px; text-align: center; color: var(--text-secondary); font-size: 12px;">Nessun canale trovato</div>';
        return;
    }
    
    const fragment = document.createDocumentFragment();
    
    const grouped = channels.reduce((acc, ch) => {
        const group = ch.group || 'Altro';
        if (!acc[group]) acc[group] = [];
        acc[group].push(ch);
        return acc;
    }, {});
    
    Object.keys(grouped).sort().forEach(group => {
        const header = document.createElement('div');
        header.className = 'channel-group-header';
        header.textContent = `${group} (${grouped[group].length})`;
        fragment.appendChild(header);
        
        grouped[group].forEach(ch => {
            const item = document.createElement('div');
            item.className = 'channel-option';
            item.dataset.url = ch.url;
            
            const isActive = App.currentChannel && App.currentChannel.url === ch.url;
            if (isActive) item.classList.add('active');
            
            item.innerHTML = `
                <div class="channel-option-logo">
                    ${ch.logo ? `<img src="${ch.logo}" alt="" loading="lazy" onerror="this.style.display='none';this.parentElement.textContent='📺'">` : '📺'}
                </div>
                <div class="channel-option-info">
                    <div class="channel-option-name">${escapeHtml(ch.name)}</div>
                    <div class="channel-option-group">${escapeHtml(ch.group || '')}</div>
                </div>
            `;
            
            item.addEventListener('click', () => {
                playChannel(ch, App.channels.indexOf(ch));
                closeDropdown();
            });
            
            fragment.appendChild(item);
        });
    });
    
    container.innerHTML = '';
    container.appendChild(fragment);
}

function filterChannels() {
    let filtered = [...App.channels];
    
    if (App.currentFilter !== 'all') {
        filtered = filtered.filter(ch => ch.group === App.currentFilter);
    }
    
    if (App.searchQuery) {
        const q = App.searchQuery.toLowerCase();
        filtered = filtered.filter(ch => 
            ch.name.toLowerCase().includes(q) ||
            (ch.group && ch.group.toLowerCase().includes(q))
        );
    }
    
    App.filteredChannels = filtered;
    renderChannels();
}

// === PLAY CHANNEL ===
function playChannel(channel, index) {
    if (!channel || !channel.url) {
        showToast('❌ Canale non valido', true);
        return;
    }
    
    App.currentChannel = channel;
    App.currentChannelIndex = index;
    
    const video = document.getElementById('videoPlayer');
    const placeholder = document.getElementById('playerPlaceholder');
    
    if (placeholder) placeholder.style.display = 'none';
    
    if (App.hls) {
        App.hls.destroy();
        App.hls = null;
    }
    
    video.pause();
    video.removeAttribute('src');
    video.load();
    
    showPlayOverlay();
    
    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
        App.hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
            backBufferLength: 90,
            maxBufferLength: 60
        });
        App.hls.loadSource(channel.url);
        App.hls.attachMedia(video);
        App.hls.on(Hls.Events.MANIFEST_PARSED, function() {
            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    hidePlayOverlay();
                    App.isPlaying = true;
                    updatePlayButton();
                    showToast(`▶ ${channel.name}`);
                }).catch(error => {
                    console.log('Autoplay bloccato:', error);
                    showToast('▶ Clicca il video per avviare', 'warning');
                });
            }
        });
        App.hls.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) {
                switch(data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        showToast('❌ Errore di rete. Riprovo...', true);
                        App.hls.startLoad();
                        break;
                    case Hls.ErrorTypes.MEDIA_ERROR:
                        showToast('❌ Errore media. Riprovo...', true);
                        App.hls.recoverMediaError();
                        break;
                    default:
                        showToast('❌ Stream non disponibile', true);
                        App.hls.destroy();
                        break;
                }
            }
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = channel.url;
        video.addEventListener('loadedmetadata', function() {
            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    hidePlayOverlay();
                    App.isPlaying = true;
                    updatePlayButton();
                }).catch(error => {
                    console.log('Autoplay bloccato:', error);
                });
            }
        });
    } else {
        showToast('❌ Formato non supportato', true);
    }
    
    renderChannels();
}

function showPlayOverlay() {
    const overlay = document.getElementById('playOverlay');
    if (overlay) overlay.classList.add('active');
}

function hidePlayOverlay() {
    const overlay = document.getElementById('playOverlay');
    if (overlay) overlay.classList.remove('active');
}

// === PLAYER CONTROLS ===
function togglePlayPause() {
    const video = document.getElementById('videoPlayer');
    if (!video.src && !App.hls) {
        showToast('❌ Seleziona un canale', true);
        return;
    }
    
    if (video.paused) {
        video.play().catch(e => {
            console.log('Errore play:', e);
            showToast('❌ Impossibile avviare', true);
        });
    } else {
        video.pause();
    }
}

function previousChannel() {
    if (App.channels.length === 0) {
        showToast('❌ Nessun canale caricato', true);
        return;
    }
    
    let newIndex = App.currentChannelIndex - 1;
    if (newIndex < 0) newIndex = App.channels.length - 1;
    
    playChannel(App.channels[newIndex], newIndex);
}

function nextChannel() {
    if (App.channels.length === 0) {
        showToast('❌ Nessun canale caricato', true);
        return;
    }
    
    let newIndex = App.currentChannelIndex + 1;
    if (newIndex >= App.channels.length) newIndex = 0;
    
    playChannel(App.channels[newIndex], newIndex);
}

function updatePlayButton() {
    const btn = document.getElementById('btnPlayPause');
    if (!btn) return;
    
    const video = document.getElementById('videoPlayer');
    const iconPlay = btn.querySelector('.icon-play');
    const iconPause = btn.querySelector('.icon-pause');
    
    if (video.paused) {
        if (iconPlay) iconPlay.classList.remove('hidden');
        if (iconPause) iconPause.classList.add('hidden');
    } else {
        if (iconPlay) iconPlay.classList.add('hidden');
        if (iconPause) iconPause.classList.remove('hidden');
    }
}

// === AUDIO ===
function toggleAudio() {
    const video = document.getElementById('videoPlayer');
    if (!video) return;
    
    App.isMuted = !App.isMuted;
    video.muted = App.isMuted;
    
    const iconOn = document.querySelector('.icon-audio-on');
    const iconOff = document.querySelector('.icon-audio-off');
    const btn = document.getElementById('btnAudio');
    
    if (App.isMuted) {
        if (iconOn) iconOn.classList.add('hidden');
        if (iconOff) iconOff.classList.remove('hidden');
        if (btn) btn.classList.add('muted');
        showToast('🔇 Audio disattivato');
    } else {
        if (iconOn) iconOn.classList.remove('hidden');
        if (iconOff) iconOff.classList.add('hidden');
        if (btn) btn.classList.remove('muted');
        showToast('🔊 Audio attivato');
    }
}

// === PIP ===
function togglePiP() {
    const video = document.getElementById('videoPlayer');
    if (!video.src) {
        showToast('❌ Avvia un canale', true);
        return;
    }
    
    if (document.pictureInPictureElement) {
        document.exitPictureInPicture();
        showToast('🖼️ PiP disattivato');
    } else if (document.pictureInPictureEnabled) {
        video.requestPictureInPicture()
            .then(() => showToast('🖼️ PiP attivato'))
            .catch(e => showToast('❌ PiP non disponibile', true));
    } else {
        showToast('❌ PiP non supportato', true);
    }
}

// === SCREENSHOT ===
function takeScreenshot() {
    const video = document.getElementById('videoPlayer');
    if (!video.src && !App.hls) {
        showToast('❌ Avvia un canale', true);
        return;
    }
    
    try {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 1280;
        canvas.height = video.videoHeight || 720;
        
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const dataUrl = canvas.toDataURL('image/png');
        
        const flash = document.getElementById('videoFlash');
        flash.classList.add('flash');
        setTimeout(() => flash.classList.remove('flash'), 200);
        
        const preview = document.createElement('img');
        preview.src = dataUrl;
        preview.className = 'screenshot-preview';
        preview.onclick = () => {
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = `SANDRO_TV_${Date.now()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            preview.remove();
            showToast('✅ Screenshot scaricato');
        };
        
        setTimeout(() => {
            if (preview.parentNode) preview.remove();
        }, 5000);
        
        document.body.appendChild(preview);
        showToast('📸 Screenshot salvato');
        if (navigator.vibrate) navigator.vibrate(30);
    } catch (e) {
        console.error(e);
        showToast('❌ Errore screenshot', true);
    }
}

// === REGISTRAZIONE ===
function toggleRecording() {
    if (App.isRecording) stopRecording();
    else startRecording();
}

function startRecording() {
    const video = document.getElementById('videoPlayer');
    if (!video.src && !App.hls) {
        showToast('❌ Avvia un canale', true);
        return;
    }
    
    try {
        const stream = video.captureStream ? video.captureStream() : video.mozCaptureStream();
        if (!stream) {
            showToast('❌ Registrazione non supportata', true);
            return;
        }
        
        App.recordedChunks = [];
        
        let mimeType = 'video/webm;codecs=vp9,opus';
        if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm;codecs=vp8,opus';
        if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
        
        App.mediaRecorder = new MediaRecorder(stream, { 
            mimeType: mimeType,
            videoBitsPerSecond: 5000000
        });
        
        App.mediaRecorder.ondataavailable = e => {
            if (e.data && e.data.size > 0) App.recordedChunks.push(e.data);
        };
        
        App.mediaRecorder.onstop = saveRecording;
        App.mediaRecorder.start(1000);
        
        App.isRecording = true;
        App.recordingStartTime = Date.now();
        
        const recBadge = document.getElementById('recBadge');
        const recBtn = document.getElementById('btnRecord');
        if (recBadge) recBadge.classList.add('active');
        if (recBtn) recBtn.classList.add('recording');
        
        App.recordingInterval = setInterval(updateRecTimer, 1000);
        
        showToast('🔴 Registrazione avviata');
    } catch (e) {
        console.error(e);
        showToast('❌ Errore registrazione', true);
    }
}

function stopRecording() {
    if (App.mediaRecorder && App.mediaRecorder.state !== 'inactive') {
        App.mediaRecorder.stop();
        App.isRecording = false;
        clearInterval(App.recordingInterval);
        
        const recBadge = document.getElementById('recBadge');
        const recBtn = document.getElementById('btnRecord');
        if (recBadge) recBadge.classList.remove('active');
        if (recBtn) recBtn.classList.remove('recording');
        
        showToast('⏹️ Registrazione fermata');
    }
}

function saveRecording() {
    if (App.recordedChunks.length === 0) return;
    
    const blob = new Blob(App.recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    
    const recTime = document.getElementById('recTime');
    
    const rec = {
        id: Date.now(),
        channel: App.currentChannel ? App.currentChannel.name : 'Unknown',
        date: new Date().toLocaleString('it-IT'),
        url: url,
        size: (blob.size / (1024 * 1024)).toFixed(2) + ' MB',
        duration: recTime ? recTime.textContent : '00:00'
    };
    
    App.recordings.unshift(rec);
    if (App.recordings.length > 30) {
        const old = App.recordings.pop();
        if (old.url) URL.revokeObjectURL(old.url);
    }
    
    App.recordedChunks = [];
    saveToStorage();
    renderRecordings();
    showToast('✅ Registrazione salvata');
}

function updateRecTimer() {
    const elapsed = Math.floor((Date.now() - App.recordingStartTime) / 1000);
    const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const s = (elapsed % 60).toString().padStart(2, '0');
    
    const recTime = document.getElementById('recTime');
    if (recTime) recTime.textContent = `${m}:${s}`;
}

function renderRecordings() {
    const container = document.getElementById('recordingsList');
    const counter = document.getElementById('recCounter');
    
    if (counter) counter.textContent = App.recordings.length;
    
    if (App.recordings.length === 0) {
        container.innerHTML = '<div style="padding: 30px; text-align: center; color: var(--text-secondary); font-size: 12px;">Nessuna registrazione</div>';
        return;
    }
    
    container.innerHTML = App.recordings.map(rec => `
        <div class="rec-item">
            <div class="rec-info">
                <div class="rec-title">${escapeHtml(rec.channel)}</div>
                <div class="rec-meta">
                    <span>${rec.date}</span>
                    <span>${rec.size}</span>
                    <span>${rec.duration}</span>
                </div>
            </div>
            <div class="rec-actions">
                <button class="rec-btn primary" onclick="playRecording(${rec.id})">▶️</button>
                <button class="rec-btn" onclick="downloadRecording(${rec.id})">⬇️</button>
                <button class="rec-btn danger" onclick="deleteRecording(${rec.id})">🗑️</button>
            </div>
        </div>
    `).join('');
}

function playRecording(id) {
    const rec = App.recordings.find(r => r.id === id);
    if (!rec) return;
    
    const video = document.getElementById('videoPlayer');
    const placeholder = document.getElementById('playerPlaceholder');
    
    if (placeholder) placeholder.style.display = 'none';
    
    if (App.hls) {
        App.hls.destroy();
        App.hls = null;
    }
    
    video.src = rec.url;
    video.play();
    App.isPlaying = true;
    updatePlayButton();
    
    closeRecordingsPanel();
}

function downloadRecording(id) {
    const rec = App.recordings.find(r => r.id === id);
    if (!rec) return;
    
    const a = document.createElement('a');
    a.href = rec.url;
    a.download = `SANDRO_TV_${rec.id}.webm`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    
    showToast('⬇️ Download avviato');
}

function deleteRecording(id) {
    if (!confirm('Eliminare questa registrazione?')) return;
    
    const rec = App.recordings.find(r => r.id === id);
    if (rec && rec.url) URL.revokeObjectURL(rec.url);
    
    App.recordings = App.recordings.filter(r => r.id !== id);
    saveToStorage();
    renderRecordings();
    showToast('🗑️ Registrazione eliminata');
}

function closeRecordingsPanel() {
    const panel = document.getElementById('recordingsPanel');
    if (panel) panel.classList.remove('open');
}

function toggleRecordingsPanel() {
    const panel = document.getElementById('recordingsPanel');
    if (panel) {
        panel.classList.toggle('open');
        if (panel.classList.contains('open')) {
            renderRecordings();
        }
    }
}

// === M3U ===
function parseM3U(data) {
    if (!data || typeof data !== 'string') {
        showToast('❌ Dati non validi', true);
        return;
    }
    
    const lines = data.split('\n');
    const newChannels = [];
    let current = null;
    
    lines.forEach(line => {
        line = line.trim();
        if (line.startsWith('#EXTINF:')) {
            const nameMatch = line.match(/,([^,]+)$/);
            const logoMatch = line.match(/tvg-logo="([^"]+)"/i);
            const groupMatch = line.match(/group-title="([^"]+)"/i);
            
            current = {
                name: nameMatch ? nameMatch[1].trim() : 'Canale',
                logo: logoMatch ? logoMatch[1] : '',
                group: groupMatch ? groupMatch[1] : 'Altro',
                url: ''
            };
        } else if (line.startsWith('http') && current) {
            current.url = line;
            newChannels.push({ ...current });
            current = null;
        }
    });
    
    if (newChannels.length === 0) {
        showToast('❌ Nessun canale trovato', true);
        return;
    }
    
    App.channels = newChannels;
    App.currentFilter = 'all';
    filterChannels();
    
    document.getElementById('channelCount').textContent = App.channels.length;
    showToast(`✅ ${newChannels.length} canali caricati`);
}

function loadM3UFromFile(file) {
    if (!file) return;
    showToast('⏳ Caricamento file...');
    const reader = new FileReader();
    reader.onload = e => parseM3U(e.target.result);
    reader.onerror = () => showToast('❌ Errore lettura file', true);
    reader.readAsText(file);
}

function loadPlaylistFromURL() {
    const url = document.getElementById('m3uInput').value.trim();
    if (!url) {
        showToast('❌ URL non valido', true);
        return;
    }
    showToast('⏳ Caricamento da URL...');
    fetch(url, { mode: 'cors' })
        .then(r => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.text();
        })
        .then(data => {
            parseM3U(data);
            document.getElementById('m3uInput').value = '';
        })
        .catch(e => {
            console.error(e);
            showToast('❌ Errore caricamento URL', true);
        });
}

function loadM3UFromURLInput() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) {
        showToast('❌ URL non valido', true);
        return;
    }
    showToast('⏳ Caricamento da URL...');
    fetch(url, { mode: 'cors' })
        .then(r => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.text();
        })
        .then(data => {
            parseM3U(data);
            closeModal('urlModal');
            document.getElementById('urlInput').value = '';
        })
        .catch(e => {
            console.error(e);
            showToast('❌ Errore caricamento URL', true);
        });
}

// === PLAYLIST MANAGEMENT ===
function savePlaylist() {
    if (!App.channels || App.channels.length === 0) {
        showToast('❌ Nessun canale da salvare', true);
        return;
    }
    
    const name = prompt('Nome playlist:', 'Playlist ' + new Date().toLocaleDateString('it-IT'));
    if (!name || name.trim() === '') return;
    
    App.savedPlaylists.push({
        name: name,
        date: new Date().toISOString(),
        channels: [...App.channels]
    });
    
    saveToStorage();
    showToast(`✅ Playlist "${name}" salvata`);
}

function showPlaylistModal() {
    const modal = document.getElementById('playlistModal');
    const list = document.getElementById('playlistList');
    
    if (App.savedPlaylists.length === 0) {
        list.innerHTML = '<div style="padding: 30px; text-align: center; color: var(--text-secondary);">📭 Nessuna playlist salvata</div>';
    } else {
        list.innerHTML = App.savedPlaylists.map((pl, i) => `
            <div style="padding: 12px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
                <div style="flex: 1;">
                    <div style="font-weight: 600; color: #fff; font-size: 13px;">${escapeHtml(pl.name)}</div>
                    <div style="font-size: 10px; color: var(--text-secondary);">${pl.channels.length} canali • ${new Date(pl.date).toLocaleDateString('it-IT')}</div>
                </div>
                <div style="display: flex; gap: 4px;">
                    <button class="rec-btn primary" onclick="loadPlaylist(${i}); closeModal('playlistModal')">📂</button>
                    <button class="rec-btn danger" onclick="deletePlaylist(${i}); showPlaylistModal()">🗑️</button>
                </div>
            </div>
        `).join('');
    }
    
    modal.classList.add('active');
}

function loadPlaylist(index) {
    const pl = App.savedPlaylists[index];
    if (pl && pl.channels) {
        App.channels = [...pl.channels];
        App.currentFilter = 'all';
        filterChannels();
        document.getElementById('channelCount').textContent = App.channels.length;
        showToast(`✅ Caricata: ${pl.name}`);
    }
}

function deletePlaylist(index) {
    if (!confirm('Eliminare questa playlist?')) return;
    App.savedPlaylists.splice(index, 1);
    saveToStorage();
    showToast('🗑️ Playlist eliminata');
}

// === MODAL ===
function openModal(modalId) {
    const modal = document.getElementById(modalId);
    if (modal) modal.classList.add('active');
}

function closeModal(modalId) {
    const modal = document.getElementById(modalId);
    if (modal) modal.classList.remove('active');
}

// === TOAST ===
function showToast(message, type = 'info') {
    const toast = document.getElementById('toast');
    const toastIcon = document.getElementById('toastIcon');
    const toastMessage = document.getElementById('toastMessage');
    
    if (!toast) return;
    
    if (toastMessage) toastMessage.textContent = message;
    
    let icon = '✓';
    let borderColor = 'var(--primary)';
    
    if (type === 'success') { icon = '✓'; borderColor = 'var(--ios-green)'; }
    else if (type === 'error') { icon = '✕'; borderColor = 'var(--ios-red)'; }
    else if (type === 'warning') { icon = '⚠'; borderColor = 'var(--ios-orange)'; }
    
    if (toastIcon) toastIcon.textContent = icon;
    toast.style.borderLeftColor = borderColor;
    
    toast.classList.add('show');
    
    clearTimeout(window.toastTimeout);
    window.toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// === INIT ===
function init() {
    console.log('🚀 SANDRO TV smart edition - Avvio...');
    
    loadFromStorage();
    
    App.channels = [...ITALY_CHANNELS];
    App.filteredChannels = [...App.channels];
    
    document.getElementById('channelCount').textContent = App.channels.length;
    
    renderChannels();
    
    showToast(`✅ ${ITALY_CHANNELS.length} canali caricati`);
    
    // Event listeners
    document.getElementById('dropdownToggle').addEventListener('click', toggleDropdown);
    
    document.getElementById('btnRecord').addEventListener('click', toggleRecording);
    document.getElementById('btnScreenshot').addEventListener('click', takeScreenshot);
    document.getElementById('btnPip').addEventListener('click', togglePiP);
    document.getElementById('btnAudio').addEventListener('click', toggleAudio);
    
    document.getElementById('btnLoadFile').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.m3u,.m3u8,.txt';
        input.onchange = e => {
            const file = e.target.files[0];
            if (file) loadM3UFromFile(file);
        };
        input.click();
    });
    
    document.getElementById('btnLoadUrl').addEventListener('click', () => openModal('urlModal'));
    document.getElementById('btnSavePlaylist').addEventListener('click', savePlaylist);
    document.getElementById('btnManagePlaylist').addEventListener('click', showPlaylistModal);
    
    document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            App.currentFilter = chip.dataset.filter;
            filterChannels();
        });
    });
    
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        let searchTimeout;
        searchInput.addEventListener('input', e => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                App.searchQuery = e.target.value;
                filterChannels();
            }, 200);
        });
    }
    
    document.getElementById('playOverlay').addEventListener('click', () => {
        const video = document.getElementById('videoPlayer');
        video.play().then(() => {
            hidePlayOverlay();
            App.isPlaying = true;
            updatePlayButton();
        }).catch(e => {
            showToast('❌ Errore riproduzione', true);
        });
    });
    
    const video = document.getElementById('videoPlayer');
    video.addEventListener('play', () => {
        App.isPlaying = true;
        updatePlayButton();
        hidePlayOverlay();
    });
    video.addEventListener('pause', () => {
        App.isPlaying = false;
        updatePlayButton();
    });
    
    // Chiudi dropdown cliccando fuori
    document.addEventListener('click', e => {
        const dropdown = document.querySelector('.channel-dropdown');
        if (dropdown && !dropdown.contains(e.target)) {
            closeDropdown();
        }
    });
    
    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        
        switch(e.key) {
            case ' ':
                e.preventDefault();
                togglePlayPause();
                break;
            case 'ArrowLeft':
                previousChannel();
                break;
            case 'ArrowRight':
                nextChannel();
                break;
            case 'm':
            case 'M':
                toggleAudio();
                break;
            case 's':
            case 'S':
                takeScreenshot();
                break;
            case 'r':
            case 'R':
                toggleRecording();
                break;
            case 'Escape':
                closeDropdown();
                document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
                break;
        }
    });
    
    console.log('✅ App inizializzata');
}

document.addEventListener('DOMContentLoaded', init);
</script>
